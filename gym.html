    <script>
      window.dateFnsFallback = {
        format: (date, fmt) => {
          const d = new Date(date);
          if (fmt === 'yyyy-MM-dd') return d.toISOString().split('T')[0];
          if (fmt === 'MMMM yyyy') return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
          if (fmt === 'MMM do') {
            const day = d.getDate();
            const suffixes = ["th", "st", "nd", "rd"];
            const val = day % 100;
            const suffix = suffixes[(val - 20) % 10] || suffixes[val] || suffixes[0];
            return d.toLocaleDateString('en-US', { month: 'short' }) + " " + day + suffix;
          }
          if (fmt === 'EEEE') return d.toLocaleDateString('en-US', { weekday: 'long' });
          if (fmt === 'MMM d, yyyy') return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          return d.toDateString();
        },
        startOfMonth: (d) => new Date(d.getFullYear(), d.getMonth(), 1),
        endOfMonth: (d) => new Date(d.getFullYear(), d.getMonth() + 1, 0),
        eachDayOfInterval: ({ start, end }) => {
          const arr = [];
          let current = new Date(start);
          while (current <= end) {
            arr.push(new Date(current));
            current.setDate(current.getDate() + 1);
          }
          return arr;
        },
        isSameDay: (a, b) => a.toDateString() === b.toDateString(),
        isToday: (d) => new Date().toDateString() === d.toDateString(),
        addMonths: (d, m) => new Date(d.getFullYear(), d.getMonth() + m, 1),
        subMonths: (d, m) => new Date(d.getFullYear(), d.getMonth() - m, 1),
        parseISO: (str) => new Date(str),
        isBefore: (a, b) => a.getTime() < b.getTime(),
        startOfDay: (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate())
      };
    </script>

        const cleanName = name.replace(/[A-Z]/g, l => `-${l.toLowerCase()}`).replace(/^-/, '');

      function CoachReport({ summary }) {
        const cleanCoachLine = (line) => {
          const cleaned = line.replace(/^#{1,6}\s*/, '').replace(/\*\*/g, '').trim();
          if (/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(cleaned)) return '';
          if (cleaned.includes('|')) {
            return cleaned.split('|').map(cell => cell.trim()).filter(Boolean).join(' / ');
          }
          return cleaned;
        };

        const lines = summary.split('\n').map(cleanCoachLine).filter(Boolean);
        const sections = [];
        let current = { title: 'Coach Overview', body: [] };

        lines.forEach(line => {
          const looksLikeTitle = /:$/.test(line) || /^[0-9]+[.)]\s+/.test(line);
          const isShort = line.length <= 48;
          if (looksLikeTitle && isShort) {
            if (current.body.length) sections.push(current);
            current = { title: line.replace(/^[0-9]+[.)]\s+/, '').replace(/:$/, ''), body: [] };
          } else {
            current.body.push(line.replace(/^[-*]\s*/, ''));
          }
        });
        if (current.body.length) sections.push(current);

        return (
          <div className="space-y-4">
            <div className="flex items-center justify-between gap-3">
              <div>
                <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Coach Report</p>
                <h4 className="text-lg font-bold text-white">Training Intelligence</h4>
              </div>
              <div className="w-10 h-10 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">

            <div className="space-y-3">

                  <div className="space-y-2">
                    {section.body.map((item, itemIndex) => (
                      <div key={itemIndex} className="flex gap-2 text-sm text-slate-300 leading-relaxed">
                        <span className="mt-2 w-1.5 h-1.5 rounded-full bg-indigo-400 flex-shrink-0" />
                        <p className="break-words">{item}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // Progress Challenge Dial Component Framework Mapping
      function TargetTracker({ current, target, onSetTarget }) {
        const progress = Math.min(100, (current / target) * 100);
        const remaining = Math.max(0, target - current);
        const circumference = 2 * Math.PI * 40;
        const strokeDashoffset = circumference - (circumference * progress) / 100;

        return (
          <div className="glass-card p-6 relative overflow-hidden flex items-center gap-6">
            <div className="relative w-24 h-24 flex-shrink-0">
              <svg className="w-full h-full transform -rotate-90">
                <circle cx="48" cy="48" r="40" stroke="rgba(255,255,255,0.05)" strokeWidth="8" fill="transparent" />
                <circle cx="48" cy="48" r="40" stroke="#6366f1" strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} fill="transparent" strokeLinecap="round" className="drop-shadow-[0_0_8px_rgba(99,102,241,0.5)]" style={{ transition: 'stroke-dashoffset 1.5s ease-out' }} />
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-xl font-black text-white">{Math.round(progress)}%</span>
                <span className="text-[8px] font-bold text-slate-400 uppercase">Done</span>
              </div>
            </div>
            <div className="flex-1 space-y-4">
              <div>
                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Active Mission</p>
                <h3 className="text-xl font-bold text-white leading-tight">{target} Day Challenge</h3>
              </div>
              <div className="flex flex-col gap-1">
                <div className="flex justify-between text-[10px] font-bold">
                  <span className="text-slate-400">{current} Achieved</span>
                  <span className="text-emerald-400">{remaining} Left</span>
                </div>
                <button onClick={onSetTarget} className="text-[9px] font-black text-indigo-400/60 hover:text-indigo-400 uppercase tracking-widest transition-all text-left">
                  Adjust Target →
                </button>
              </div>
            </div>
          </div>
        );
      }

      function PumpStreakApp() {
        const [isReady, setIsReady] = useState(false);
        const [profile, setProfile] = useState({ uid: MOCK_USER.uid, currentStreak: 0, longestStreak: 0, streakTarget: 30, coachGoal: "", bodyWeights: [] });
        const [completions, setCompletions] = useState([]);
        const [plans, setPlans] = useState([]);
        const [library, setLibrary] = useState([]);
        
        const [currentDate, setCurrentDate] = useState(new Date());
        const [selectedDate, setSelectedDate] = useState(null);
        const [activeTab, setActiveTab] = useState('dashboard');
        const [modalTab, setModalTab] = useState('log');
        const [targetInput, setTargetInput] = useState('30');
        
        const [coachSummary, setCoachSummary] = useState('');
        const [coachError, setCoachError] = useState('');
        const [coachLoading, setCoachLoading] = useState(false);
        const [coachGoalInput, setCoachGoalInput] = useState('');
        
        const [bodyWeightDate, setBodyWeightDate] = useState(format(new Date(), 'yyyy-MM-dd'));
        const [bodyWeightValue, setBodyWeightValue] = useState('');
        const [muscleInput, setMuscleInput] = useState('');
        const [exerciseInputs, setExerciseInputs] = useState([]);

        const [vaultName, setVaultName] = useState('');
        const [vaultType, setVaultType] = useState('exercise');

        useEffect(() => {
          const bindSync = () => {
            if (window.FirebaseDB) {
              setIsReady(true);
              startProductionListeners(window.FirebaseDB, window.FirebaseUtils);
            }
          };
          bindSync();
          window.addEventListener('firebase-initialized', bindSync);
          return () => window.removeEventListener('firebase-initialized', bindSync);
        }, []);

        const startProductionListeners = (db, utils) => {
          utils.onSnapshot(utils.doc(db, 'users', MOCK_USER.uid), (snap) => {
            if (snap.exists()) setProfile(snap.data());
          });
          utils.onSnapshot(utils.query(utils.collection(db, 'user_library'), utils.where('userId', '==', MOCK_USER.uid)), (snap) => {
            setLibrary(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });
          utils.onSnapshot(utils.query(utils.collection(db, 'completions'), utils.where('userId', '==', MOCK_USER.uid)), (snap) => {
            setCompletions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });
          utils.onSnapshot(utils.query(utils.collection(db, 'plans'), utils.where('userId', '==', MOCK_USER.uid)), (snap) => {
            setPlans(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });
        };

        const statsCalculated = useMemo(() => {
          if (!completions.length) return { current: 0, longest: profile?.longestStreak || 0 };
          const completedDates = new Set(completions.filter(c => c.isCompleted).map(c => c.date));
          
          let current = 0;
          let checkDate = new Date();
          if (!completedDates.has(format(checkDate, 'yyyy-MM-dd'))) checkDate.setDate(checkDate.getDate() - 1);
          while (completedDates.has(format(checkDate, 'yyyy-MM-dd'))) {
            current++;
            checkDate.setDate(checkDate.getDate() - 1);
          }

          let max = 0, temp = 0;
          const allDatesOrdered = Array.from(completedDates).sort();
          for (let i = 0; i < allDatesOrdered.length; i++) {
            if (i > 0) {
              const diff = (parseISO(allDatesOrdered[i]).getTime() - parseISO(allDatesOrdered[i-1]).getTime()) / (1000 * 60 * 60 * 24);
              if (Math.round(diff) === 1) temp++; else temp = 1;
            } else temp = 1;
            max = Math.max(max, temp);
          }
          return { current, longest: Math.max(max, profile?.longestStreak || 0) };
        }, [completions, profile]);

        useEffect(() => {
          if (!isReady || (statsCalculated.current === 0 && statsCalculated.longest === 0)) return;
          const userRef = window.FirebaseUtils.doc(window.FirebaseDB, 'users', MOCK_USER.uid);
          const updateRemoteStreak = async () => {
            try {
              await window.FirebaseUtils.setDoc(userRef, { 
                currentStreak: statsCalculated.current, 
                longestStreak: statsCalculated.longest,
                updatedAt: window.FirebaseUtils.serverTimestamp() 
              }, { merge: true });
            } catch (e) { console.error(e); }
          };
          const timer = setTimeout(updateRemoteStreak, 2000);
          return () => clearTimeout(timer);
        }, [statsCalculated.current, statsCalculated.longest, isReady]);

        const toggleCompletion = async (dateStr, intensity = 'Standard') => {
          if (!isReady) return;
          const docId = `${MOCK_USER.uid}_${dateStr}`;
          const docRef = window.FirebaseUtils.doc(window.FirebaseDB, 'completions', docId);
          const existing = completions.find(c => c.date === dateStr);
          try {
            if (existing) {
              await window.FirebaseUtils.deleteDoc(docRef);
            } else {
              await window.FirebaseUtils.setDoc(docRef, {
                userId: MOCK_USER.uid, date: dateStr, isCompleted: true, type: 'gym', intensity, updatedAt: window.FirebaseUtils.serverTimestamp()
              });
            }
          } catch (e) { console.error(e); }
        };

        const savePlan = async (dateStr) => {
          if (!isReady) return;
          const docId = `${MOCK_USER.uid}_${dateStr}`;
          const docRef = window.FirebaseUtils.doc(window.FirebaseDB, 'plans', docId);
          const muscles = muscleInput.split(',').map(m => m.trim()).filter(m => m.length > 0);
          const exercises = exerciseInputs.filter(ex => ex.name.trim().length > 0);
          try {
            await window.FirebaseUtils.setDoc(docRef, {
              userId: MOCK_USER.uid, date: dateStr, muscles, exercises, updatedAt: window.FirebaseUtils.serverTimestamp()
            });
          } catch (e) { console.error(e); }
        };

        const updateTarget = async (days) => {
          if (!isReady) return;
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'users', MOCK_USER.uid), { 
              streakTarget: days, updatedAt: window.FirebaseUtils.serverTimestamp() 
            }, { merge: true });
            setSelectedDate(null);
          } catch (e) { console.error(e); }
        };

        const addToLibrary = async (name, type, muscles) => {
          if (!isReady) return;
          const docId = `${MOCK_USER.uid}_${type}_${name.replace(/\s+/g, '_')}`;
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'user_library', docId), {
              userId: MOCK_USER.uid, name, type, muscles: muscles || [], createdAt: window.FirebaseUtils.serverTimestamp()
            });
          } catch (e) { console.error(e); }
        };

        const removeFromLibrary = async (id) => {
          if (!isReady) return;
          try { await window.FirebaseUtils.deleteDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'user_library', id)); } catch(e) { console.error(e); }
        };

        const saveCoachGoal = async () => {
          if (!isReady) return;
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'users', MOCK_USER.uid), {
              coachGoal: coachGoalInput.trim(), updatedAt: window.FirebaseUtils.serverTimestamp()
            }, { merge: true });
          } catch (e) { console.error(e); }
        };

        const saveBodyWeight = async () => {
          if (!isReady || !bodyWeightDate || !bodyWeightValue.trim()) return;
          const nextWeights = [
            { date: bodyWeightDate, weight: bodyWeightValue.trim() },
            ...(profile?.bodyWeights || []).filter(e => e.date !== bodyWeightDate)
          ].sort((a, b) => b.date.localeCompare(a.date));
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'users', MOCK_USER.uid), {
              bodyWeights: nextWeights, updatedAt: window.FirebaseUtils.serverTimestamp()
            }, { merge: true });
            setBodyWeightValue('');
          } catch (e) { console.error(e); }
        };

        const removeBodyWeight = async (dateStr) => {
          if (!isReady) return;
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'users', MOCK_USER.uid), {
              bodyWeights: (profile?.bodyWeights || []).filter(e => e.date !== dateStr),
              updatedAt: window.FirebaseUtils.serverTimestamp()
            }, { merge: true });
          } catch (e) { console.error(e); }
        };

        const updatePlanExercise = async (plan, exerciseIndex, updates) => {
          if (!isReady) return;
          const nextExercises = plan.exercises.map((ex, index) => index === exerciseIndex ? { ...ex, ...updates } : ex);
          try {
            await window.FirebaseUtils.setDoc(window.FirebaseUtils.doc(window.FirebaseDB, 'plans', plan.id), {
              exercises: nextExercises, updatedAt: window.FirebaseUtils.serverTimestamp()
            }, { merge: true });
          } catch (e) { console.error(e); }
        };

        const calendarDays = useMemo(() => {
          return eachDayOfInterval({ start: startOfMonth(currentDate), end: endOfMonth(currentDate) });
        }, [currentDate]);

        const completedExerciseSummaries = useMemo(() => {
          return completions
            .filter(c => c.isCompleted)
            .map(c => {
              const plan = plans.find(p => p.date === c.date);
              return { date: c.date, intensity: c.intensity || 'Standard', muscles: plan?.muscles || [], exercises: plan?.exercises || [] };
            })
            .filter(s => s.exercises.length > 0)
            .sort((a, b) => b.date.localeCompare(a.date));
        }, [completions, plans]);

        const coachDigest = useMemo(() => {
          const recentSessions = completedExerciseSummaries.slice(0, 8);
          return {
            totalCompletedPlannedSessions: completedExerciseSummaries.length,
            goal: (profile?.coachGoal || ''),
            bodyWeightHistory: (profile?.bodyWeights || []).slice(0, 12).map(e => `${e.date}: ${e.weight}`),
            recentSessions: recentSessions.map(s => ({
              date: s.date, intensity: s.intensity, muscles: s.muscles, exercises: s.exercises.map(e => `${e.name} (${e.sets})`)
            }))
          };
        }, [completedExerciseSummaries, profile]);

        const generateCoachSummary = async () => {
          setCoachError('');
          if (coachDigest.recentSessions.length === 0) {
            setCoachError('No completed planned exercises found yet. Complete a planned session first.');
            return;
          }
          setCoachLoading(true);
          try {
            setTimeout(() => {
              setCoachSummary("### Training Summary Patterns:\n- Active compliance is noted across recorded tracking blocks.\n- Ensure steady structural progression parameters remain focused on priority groups.");
              setCoachLoading(false);
            }, 1000);
          } catch (error) {
            setCoachError('AI Coach analysis query error.');
            setCoachLoading(false);
          }
        };

        return (
          <div className="min-h-screen bg-[#0f172a] text-white font-sans overflow-x-hidden relative">
            <div className="fixed top-[-5%] left-[-5%] w-[300px] h-[300px] bg-indigo-600/20 rounded-full blur-[80px] pointer-events-none" />
            <div className="fixed bottom-[-5%] right-[-5%] w-[400px] h-[400px] bg-emerald-600/15 rounded-full blur-[100px] pointer-events-none" />

            <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-6 relative z-10 pb-32">
              <header className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-emerald-400 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <VectorIcon name="Dumbbell" className="w-5 h-5 text-white" />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight">PUMP STREAK</h1>
                    <p className="text-slate-400 text-[8px] uppercase tracking-widest font-bold">No Days Off</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex items-center gap-2 px-3 py-1.5 glass-panel">
                    <img src={MOCK_USER.photoURL} className="w-5 h-5 rounded-md" alt="Avatar" />
                    <span className="text-[10px] font-bold text-slate-300 hidden sm:inline">{MOCK_USER.displayName}</span>
                  </div>
                </div>
              </header>

              {activeTab === 'dashboard' && (
                <div className="space-y-6">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <StatCard label="Current Streak" value={`${statsCalculated.current}d`} emoji="🔥" />
                    <StatCard label="Best Streak" value={`${statsCalculated.longest}d`} emoji="🏆" />
                    <StatCard label="Total Completed" value={completions.length} emoji="⚡" />
                    <StatCard label="Status" value={statsCalculated.current > 0 ? "Active" : "Halted"} emoji="🛡️" />
                  </div>

                  {(() => {
                    const todayStr = format(new Date(), 'yyyy-MM-dd');
                    const todayPlan = plans.find(p => p.date === todayStr);
                    const completion = completions.find(c => c.date === todayStr);
                    const isDone = !!completion;
                    const completedExercises = todayPlan?.exercises.filter(ex => ex.completed).length || 0;
                    const workoutProgress = todayPlan?.exercises.length ? Math.round((completedExercises / todayPlan.exercises.length) * 100) : 0;

                    return (
                      <div className="glass-card p-6 border-emerald-500/20 relative overflow-hidden">
                        <div className="flex justify-between items-start mb-4">
                          <div>
                            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Today's Protocol</p>
                            <div className="flex items-center gap-2">
                              <h3 className="text-2xl font-bold text-white">{isDone ? 'Session Locked' : todayPlan ? 'Active Session' : 'No Strategy Set'}</h3>
                              {isDone && completion?.intensity && (
                                <span className={`text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full border ${completion.intensity === 'Low' ? 'border-sky-500/30 text-sky-400' : completion.intensity === 'Standard' ? 'border-emerald-500/30 text-emerald-400' : 'border-rose-500/30 text-rose-400'}`}>{completion.intensity}</span>
                              )}
                            </div>
                          </div>
                          {!isDone && (
                            <button type="button" onClick={() => { setSelectedDate(startOfDay(new Date())); setModalTab('log'); }} className="px-4 py-2 bg-emerald-500 text-white text-[10px] font-black uppercase tracking-widest rounded-xl shadow-lg shadow-emerald-500/20">Log Session</button>
                          )}
                        </div>

                        {todayPlan && (
                          <div className="space-y-4">
                            <div className="flex gap-2 flex-wrap">
                              {todayPlan.muscles.map(m => (
                                <span key={m} className="text-[9px] px-2 py-0.5 bg-indigo-500/10 rounded text-indigo-300 border border-indigo-500/20">#{m}</span>
                              ))}
                            </div>
                            <div className="space-y-2">
                              <div className="flex items-center justify-between text-[10px] font-black uppercase tracking-widest">
                                <span className="text-slate-400">Workout Progress</span>
                                <span className="text-emerald-400">{workoutProgress}% Complete</span>
                              </div>
                              <div className="h-2 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                <div className="h-full bg-gradient-to-r from-emerald-500 to-indigo-400" style={{ width: `${workoutProgress}%`, transition: 'width 0.4s' }} />
                              </div>
                            </div>
                            <div className="grid grid-cols-1 gap-2 max-h-72 overflow-y-auto custom-scrollbar pr-2">
                              {todayPlan.exercises.map((ex, i) => (
                                <div key={i} className={`p-3 rounded-xl border transition-all ${ex.completed ? "bg-emerald-500/10 border-emerald-500/25" : "bg-white/5 border-white/5"}`}>
                                  <div className="flex items-start justify-between gap-3">
                                    <div className="min-w-0">
                                      <p className={`text-xs font-bold leading-snug break-words ${ex.completed ? "text-emerald-200" : "text-slate-200"}`}>{ex.name}</p>
                                    </div>
                                    <button type="button" onClick={() => updatePlanExercise(todayPlan, i, { completed: !ex.completed })} disabled={isDone} className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider border transition-all ${ex.completed ? "bg-emerald-500 text-white border-emerald-400" : "bg-white/5 text-slate-400 border-white/10"}`}>
                                      {ex.completed ? 'Done' : 'Mark'}
                                    </button>
                                  </div>
                                </div>
                              ))}
                            </div>
                            {!isDone && todayPlan.exercises.length > 0 && (
                              <button type="button" onClick={() => toggleCompletion(todayStr, 'Standard')} className="w-full py-3 bg-emerald-500 text-white border-emerald-400 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Mark Today Complete</button>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {profile?.streakTarget ? (
                    <TargetTracker current={statsCalculated.current} target={profile.streakTarget} onSetTarget={() => { setModalTab('target'); setSelectedDate(new Date()); }} />
                  ) : (
                    <div className="glass-panel p-6 flex flex-col items-center justify-center gap-4 text-center">
                      <h3 className="text-lg font-bold text-white">No Target Set</h3>
                      <button type="button" onClick={() => { setModalTab('target'); setSelectedDate(new Date()); }} className="px-6 py-2 bg-indigo-500 text-white text-xs font-black uppercase tracking-widest rounded-xl">Set Goal</button>
                    </div>
                  )}

                  <div className="space-y-4">
                    <h3 className="text-xs font-black text-indigo-400 uppercase tracking-widest pl-1">Unlocked Milestones</h3>
                    <MilestoneBadges current={statsCalculated.longest} />
                  </div>
                </div>
              )}

              {activeTab === 'calendar' && (
                <div className="backdrop-blur-md bg-white/5 border border-white/10 rounded-2xl p-4 sm:p-6">
                  <div className="flex items-center justify-between mb-6">
                    <h2 className="text-lg font-bold text-slate-200">{format(currentDate, 'MMMM yyyy')}</h2>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setCurrentDate(subMonths(currentDate, 1))} className="p-1.5 glass-panel"><VectorIcon name="ChevronLeft" /></button>
                      <button type="button" onClick={() => setCurrentDate(addMonths(currentDate, 1))} className="p-1.5 glass-panel"><VectorIcon name="ChevronRight" /></button>
                    </div>
                  </div>

                  <div className="grid grid-cols-7 gap-2">
                    {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => (
                      <div key={i} className="text-center text-[10px] font-bold text-slate-500 pb-2 uppercase">{d}</div>
                    ))}
                    {Array.from({ length: startOfMonth(currentDate).getDay() }).map((_, i) => (
                      <div key={i} className="aspect-square opacity-0" />
                    ))}
                    {calendarDays.map((date) => {
                      const dateStr = format(date, 'yyyy-MM-dd');
                      const isDone = completions.some(c => c.date === dateStr);
                      const hasPlan = plans.some(p => p.date === dateStr);
                      const isSeld = selectedDate && isSameDay(date, selectedDate);
                      const isFuture = isBefore(startOfDay(new Date()), date) && !isToday(date);

                      return (
                        <button key={dateStr} type="button" onClick={() => setSelectedDate(date)} className={`aspect-square rounded-xl flex flex-col items-center justify-center relative border ${isDone ? "bg-gradient-to-br from-emerald-400 to-emerald-600 border-emerald-300 shadow-[0_0_25px_rgba(16,185,129,0.4)]" : isSeld ? "bg-indigo-500/30 border-indigo-400" : "bg-white/5 border-white/10"} ${isToday(date) && !isDone ? "border-indigo-500" : ""} ${isFuture && !hasPlan ? "opacity-40" : ""}`}>
                          <span className={`text-[10px] font-bold ${isDone || isSeld ? "text-white" : "text-slate-500"}`}>{format(date, 'd')}</span>
                          {isDone && <VectorIcon name="CheckCircle2" className="w-3 h-3 text-white mt-1" />}
                          {!isDone && hasPlan && <div className="mt-1 w-1 h-1 bg-white/40 rounded-full" />}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeTab === 'coach' && (
                <div className="glass-card p-6 space-y-6 relative overflow-hidden">
                  <div className="flex items-start justify-between gap-4 relative z-10">
                    <div className="space-y-2">
                      <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">AI Coach</p>
                      <h3 className="text-2xl font-bold text-white">Completed Exercise Review</h3>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <StatCard label="Reviewed Sessions" value={completedExerciseSummaries.length} emoji="AI" />
                    <StatCard label="Weight Progressions" value={(profile?.bodyWeights || []).length} emoji="WT" />
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div className="p-4 rounded-2xl bg-slate-950/30 border border-white/10 space-y-3">
                      <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Target Strategy Objectives</p>
                      <textarea value={coachGoalInput} onChange={(e) => setCoachGoalInput(e.target.value)} placeholder="Example: Cut while maintaining alignment strength splits..." className="w-full min-h-24 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:border-indigo-500 outline-none resize-none" />
                      <button type="button" onClick={saveCoachGoal} className="w-full py-3 bg-indigo-500/20 text-indigo-200 rounded-xl text-[10px] font-black uppercase tracking-widest border border-indigo-500/30">Save Goal</button>
                    </div>

                    <div className="p-4 rounded-2xl bg-slate-950/30 border border-white/10 space-y-3">
                      <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Log Body Weight Metric</p>
                      <div className="grid grid-cols-[1fr_0.8fr] gap-2">
                        <input type="date" value={bodyWeightDate} onChange={(e) => setBodyWeightDate(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:border-emerald-500 outline-none" />
                        <input type="text" value={bodyWeightValue} onChange={(e) => setBodyWeightValue(e.target.value)} placeholder="kg" className="bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:border-emerald-500 outline-none" />
                      </div>
                      <button type="button" onClick={saveBodyWeight} disabled={!bodyWeightValue.trim()} className="w-full py-3 bg-emerald-500/20 text-emerald-200 rounded-xl text-[10px] font-black uppercase tracking-widest border border-emerald-500/30">Save Weight</button>
                    </div>
                  </div>

                  <button type="button" onClick={generateCoachSummary} className="w-full py-4 bg-gradient-to-r from-indigo-600 to-emerald-500 text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-indigo-500/20">
                    {coachLoading ? 'Thinking...' : 'Generate Coach Summary'}
                  </button>

                  {coachSummary && <div className="p-5 rounded-2xl bg-white/5 border border-white/10"><CoachReport summary={coachSummary} /></div>}
                </div>
              )}

              {activeTab === 'library' && (
                <div className="glass-card p-6 space-y-6">
                  <h3 className="text-xl font-bold text-white">Personal Vault</h3>
                  <div className="p-6 bg-white/5 rounded-[32px] border border-white/10 space-y-4">
                    <div className="flex bg-white/5 p-1 rounded-xl gap-1">
                      {['exercise', 'muscle'].map(t => (
                        <button key={t} type="button" onClick={() => setVaultType(t)} className={`flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg ${vaultType === t ? "bg-indigo-500 text-white" : "text-slate-500"}`}>{t}</button>
                      ))}
                    </div>
                    <input type="text" value={vaultName} onChange={(e) => setVaultName(e.target.value)} placeholder="Name Entry Label..." className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:border-indigo-500 outline-none" />
                    <button type="button" onClick={() => { if(vaultName) { addToLibrary(vaultName, vaultType, []); setVaultName(''); } }} className="w-full py-4 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-indigo-500/20">Add to Library</button>
                  </div>

                  <div className="space-y-3">
                    {library.map(item => (
                      <div key={item.id} className="flex justify-between items-center p-4 glass-panel border-white/5">
                        <div>
                          <p className="text-sm font-bold text-white">{item.name}</p>
                          <span className="text-[7px] font-black uppercase px-1.5 py-0.5 rounded border border-indigo-500/30 text-indigo-400">{item.type}</span>
                        </div>
                        <button type="button" onClick={() => removeFromLibrary(item.id)} className="p-2 text-rose-500/40 hover:text-rose-400"><VectorIcon name="X" /></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <BottomNav activeTab={activeTab} onTabChange={setActiveTab} />

            {selectedDate && (
              <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
                <div onClick={() => setSelectedDate(null)} className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" />
                <div className="relative w-full max-w-lg glass-card p-6 sm:p-10 rounded-t-[32px] sm:rounded-[40px] flex flex-col max-h-[90vh] overflow-y-auto">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-white">{format(selectedDate, 'MMM do')} System Controls</h2>
                    <button type="button" onClick={() => setSelectedDate(null)}><VectorIcon name="X" className="text-zinc-500" /></button>
                  </div>

                  <div className="flex bg-white/5 p-1 rounded-xl gap-1 mb-6">
                    {['log', 'plan', 'target'].map((t) => (
                      <button key={t} type="button" onClick={() => setModalTab(t)} className={`flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg ${modalTab === t ? "bg-white/10 text-white" : "text-zinc-500"}`}>{t}</button>
                    ))}
                  </div>

                  {modalTab === 'log' && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-3 gap-2">
                        {['Low', 'Standard', 'High'].map(level => (
                          <button key={level} type="button" onClick={() => { toggleCompletion(format(selectedDate, 'yyyy-MM-dd'), level); setSelectedDate(null); }} className="py-3 rounded-xl border text-[10px] font-black uppercase tracking-widest bg-emerald-500/5 text-emerald-400 border-emerald-500/30">{level}</button>
                        ))}
                      </div>
                    </div>
                  )}

                  {modalTab === 'target' && (
                    <div className="space-y-4">
                      <input type="number" value={targetInput} onChange={(e) => setTargetInput(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-center text-white outline-none" />
                      <button type="button" onClick={() => updateTarget(parseInt(targetInput) || 30)} className="w-full py-4 bg-gradient-to-r from-indigo-500 to-emerald-500 text-white font-bold rounded-2xl">Establish Goal</button>
                    </div>
                  )}

                  {modalTab === 'plan' && (
                    <div className="space-y-4">
                      <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Muscle Group Split Indicators</label>
                      <input type="text" value={muscleInput} onChange={(e) => setMuscleInput(e.target.value)} placeholder="Chest, Back..." className="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-xs text-white outline-none" />
                      
                      <div className="space-y-2">
                        {exerciseInputs.map((ex, idx) => (
                          <ExerciseReorderItem key={idx} ex={ex} i={idx} exerciseInputs={exerciseInputs} setExerciseInputs={setExerciseInputs} />
                        ))}
                        <button type="button" onClick={() => setExerciseInputs([...exerciseInputs, {name: '', sets: ''}])} className="text-xs text-indigo-400">+ Add New Exercise Line</button>
                      </div>

                      <div className="pt-2">
                        <DatabasePicker type="muscle" library={library} onSelect={(v) => setMuscleInput(prev => prev ? `${prev}, ${v}` : v)} onCustom={(v) => addToLibrary(v, 'muscle')} />
                      </div>

                      <button type="button" onClick={() => { savePlan(format(selectedDate, 'yyyy-MM-dd')); setSelectedDate(null); }} className="w-full py-4 bg-indigo-500 text-white font-bold rounded-2xl">Save Strategy</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<PumpStreakApp />);
    </script>
  </body>
</html>

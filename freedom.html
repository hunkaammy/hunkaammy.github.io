<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media library</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; margin: 0; }
        nav { display: flex; justify-content: center; padding: 20px; gap: 20px; background: #222; }
        button { padding: 10px 20px; cursor: pointer; border: none; background: #444; color: white; border-radius: 5px; }
        button:hover { background: #666; }
        .tab-content { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .active { display: grid; }
        .item { border-radius: 8px; overflow: hidden; }
        img, video { width: 100%; height: 250px; object-fit: cover; }
    </style>
</head>
<body>

<nav>
    <button onclick="showtab('videos')">videos</button>
    <button onclick="showtab('images')">images</button>
</nav>

<div id="videos" class="tab-content active"></div>
<div id="images" class="tab-content"></div>

<script>
    function showtab(tabname) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabname).classList.add('active');
    }

    fetch('timeline_tab_372158085.json')
        .then(response => response.json())
        .then(data => {
            const videoFeed = document.getElementById('videos');
            const imageFeed = document.getElementById('images');
            
            // remove query params and deduplicate
            const uniqueData = [...new Map(data.filter(item => item.url).map(item => [item.url.split('?')[0], item])).values()];

            uniqueData.forEach(item => {
                const url = item.url.split('?')[0];
                const container = document.createElement('div');
                container.classList.add('item');

                if (item.type === 'media' || url.includes('.mp4') || url.includes('.gif')) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.controls = true;
                    container.appendChild(video);
                    videoFeed.appendChild(container);
                } else {
                    const img = document.createElement('img');
                    img.src = url;
                    container.appendChild(img);
                    imageFeed.appendChild(container);
                }
            });
        });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA-OPTIMIZED PREMIUM STREAM FEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #050505;
            color: #f5f5f5;
            overflow-x: hidden;
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            will-change: transform;
        }

        /* NAVIGATION CONTROL BAR */
        header {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .nav-pill {
            display: flex;
            background: rgba(18, 18, 18, 0.65);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-btn {
            background: none;
            border: none;
            color: #8c8c8c;
            padding: 10px 28px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn.active {
            background: #ffffff;
            color: #000000;
        }

        /* FLOATING VOLUME ICON */
        .audio-manager {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            z-index: 90;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .audio-manager:hover { background: rgba(255,255,255,0.2); }
        .audio-manager svg { fill: #fff; width: 18px; height: 18px; }

        /* FAVORITE ACTION BUTTONS */
        .fav-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fav-btn:active { transform: scale(1.3); }
        .fav-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            transition: fill 0.3s, stroke 0.3s;
        }
        .fav-btn.is-fav svg {
            fill: #ff2d55;
            stroke: #ff2d55;
        }

        /* VIEWPORT CONFIGURATIONS */
        .view-section { display: none; min-height: 100vh; }
        .view-section.active { display: block; }

        /* REELS SNAP VIEWPORTS */
        #video-view {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            background: #000;
        }
        #video-view::-webkit-scrollbar { display: none; }

        .reel-node {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            max-width: 480px;
            object-fit: contain;
            background: #000;
            cursor: pointer;
        }

        .reel-meta-deck {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 60px 24px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .reel-info-left {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .reel-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            line-height: 1.5;
            letter-spacing: -0.01em;
        }

        .reel-origin {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .reel-actions-right {
            pointer-events: auto;
            padding-bottom: 5px;
        }

        /* IMAGE GALLERY MASONRY VIEWS */
        #image-view {
            padding: 100px 24px 40px;
            background-color: #050505;
        }

        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .gallery-card {
            background: #0d0d0d;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }
        .gallery-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.1);
        }

        .img-slot {
            width: 100%;
            padding-top: 130%;
            position: relative;
            background: #111;
        }
        .img-slot img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .img-slot img.loaded { opacity: 1; }

        .gallery-desc { 
            padding: 16px; 
            background: #0c0d0d; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .gallery-text { 
            font-size: 0.8rem; 
            font-weight: 400; 
            color: #e0e0e0; 
            line-height: 1.4; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            flex-grow: 1;
        }

        /* LOADER LAYERS */
        .app-loader {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; z-index: 1000;
        }
        .bar-pulse {
            display: flex; align-items: flex-end; gap: 4px; height: 24px; margin-bottom: 12px;
        }
        .bar-pulse div { width: 3px; height: 100%; background: #fff; animation: pulse 0.6s infinite alternate; }
        .bar-pulse div:nth-child(2) { animation-delay: 0.2s; }
        .bar-pulse div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0% { height: 30%; } 100% { height: 100%; } }
    </style>
</head>
<body>

    <div id="app-viewport">
        <header>
            <div class="nav-pill">
                <button class="nav-btn active" id="btn-video" onclick="viewRoute('video')">REELS</button>
                <button class="nav-btn" id="btn-image" onclick="viewRoute('image')">GALLERY</button>
            </div>
        </header>

        <div id="loader" class="app-loader">
            <div class="bar-pulse"><div></div><div></div><div></div></div>
            <p style="font-size: 0.7rem; letter-spacing: 0.15em; color: #555; font-weight:600;">SHUFFLING DATA PACKS...</p>
        </div>

        <div class="audio-manager" onclick="toggleGlobalAudioVolume()" title="Toggle Sound">
            <svg id="vol-muted" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM4.34 2.93L2.93 4.34 7.29 8.75H3v6.5h4l5 5V8.46l4.74 4.74c-.38.28-.8.52-1.24.68v2.12c.98-.23 1.89-.73 2.64-1.39l2.51 2.51 1.41-1.41L4.34 2.93zM10 15.17l-2.41-2.42H5v-2.5h2.59L10 7.84v7.33z"/></svg>
            <svg id="vol-active" style="display:none;" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <main id="video-view" class="view-section active"></main>

        <main id="image-view" class="view-section">
            <div class="gallery-grid" id="gallery-container"></div>
        </main>
    </div>

    <script>
        const RESOURCE_TARGET = "https://www.hindustantoys.in/TEST//data.json";
        let localVideoStack = [];
        let localImageStack = [];
        let systemAudioMuted = true;
        let intersectionObserverInstance = null;
        
        // STORAGE REFERENCE SYMBOLS
        const STORAGE_KEY = "PREMIUM_FEED_FAVORITES";
        let favoriteRegistry = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

        function viewRoute(targetSection) {
            document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            if(targetSection === 'video') {
                document.getElementById('video-view').classList.add('active');
                document.getElementById('btn-video').classList.add('active');
                evaluateVideoPlayStates();
            } else {
                document.getElementById('image-view').classList.add('active');
                document.getElementById('btn-image').classList.add('active');
                freezeVideoAssets();
            }
        }

        function freezeVideoAssets() {
            document.querySelectorAll('.reel-video').forEach(video => {
                video.pause();
                if(video.dataset.srcAttached === "true") {
                    video.removeAttribute('src');
                    video.load();
                    video.dataset.srcAttached = "false";
                }
            });
        }

        function toggleGlobalAudioVolume() {
            systemAudioMuted = !systemAudioMuted;
            const muteIcon = document.getElementById('vol-muted');
            const activeIcon = document.getElementById('vol-active');

            if(systemAudioMuted) {
                muteIcon.style.display = "block";
                activeIcon.style.display = "none";
            } else {
                muteIcon.style.display = "none";
                activeIcon.style.display = "block";
            }

            document.querySelectorAll('.reel-video').forEach(vid => {
                vid.muted = systemAudioMuted;
            });
        }

        function evaluateVideoPlayStates() {
            if (!document.getElementById('video-view').classList.contains('active')) return;
            
            const reels = document.querySelectorAll('.reel-node');
            const innerHeight = window.innerHeight;

            reels.forEach(reel => {
                const boundary = reel.getBoundingClientRect();
                const video = reel.querySelector('.reel-video');
                const absoluteTargetSrc = video.dataset.rawSrc;

                if (boundary.top >= -innerHeight * 0.6 && boundary.top <= innerHeight * 0.6) {
                    if (video.dataset.srcAttached !== "true") {
                        video.setAttribute('src', absoluteTargetSrc);
                        video.load();
                        video.dataset.srcAttached = "true";
                    }
                    
                    if (boundary.top >= -100 && boundary.top <= 100) {
                        if (video.paused) {
                            video.muted = systemAudioMuted;
                            video.play().catch(() => {});
                        }
                    } else {
                        if (!video.paused) video.pause();
                    }
                } else {
                    if (video.dataset.srcAttached === "true") {
                        video.removeAttribute('src');
                        video.load();
                        video.dataset.srcAttached = "false";
                    }
                }
            });
        }

        function extractCleanPathKey(urlPath) {
            try {
                const urlObj = new URL(urlPath);
                let cleanPath = urlObj.origin + urlObj.pathname;
                cleanPath = cleanPath.replace(/_(\d+p)\.mp4/g, '_base.mp4');
                cleanPath = cleanPath.split('?')[0]; 
                return cleanPath;
            } catch (e) {
                return urlPath.split('?')[0].replace(/_(\d+p)\.mp4/g, '_base.mp4');
            }
        }

        // FISHER-YATES ALGORITHM SHUFFLE OPTIMIZER
        function shuffleDataArray(targetArray) {
            for (let i = targetArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [targetArray[i], targetArray[j]] = [targetArray[j], targetArray[i]];
            }
            return targetArray;
        }

        // LOCALSTORAGE INTERACTION HOOK FOR ASSETS
        function toggleFavoriteStatus(uniqueKey) {
            if (favoriteRegistry[uniqueKey]) {
                delete favoriteRegistry[uniqueKey];
            } else {
                favoriteRegistry[uniqueKey] = true;
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(favoriteRegistry));
            
            // DYNAMIC UPDATE SIBLING HOOK ELEMENTS
            document.querySelectorAll(`[data-fav-id="${uniqueKey}"]`).forEach(btn => {
                if (favoriteRegistry[uniqueKey]) btn.classList.add('is-fav');
                else btn.classList.remove('is-fav');
            });
        }

        async function initDataPipelineExecution() {
            try {
                const payload = await fetch(RESOURCE_TARGET);
                if (!payload.ok) throw new Error("API STRUCT DATA RESPONSE ERROR");
                const arrayPack = await payload.json();

                processPayloadSorting(arrayPack);
                
                // EXECUTE DYNAMIC PACK SHUFFLING PIPELINES BEFORE INJECTION
                shuffleDataArray(localVideoStack);
                shuffleDataArray(localImageStack);

                compileReelsStructure();
                compileGalleryStructure();

                document.getElementById('loader').style.display = "none";

                let scrollTimeout;
                document.getElementById('video-view').addEventListener('scroll', () => {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(evaluateVideoPlayStates, 40);
                }, { passive: true });

            } catch (err) {
                console.error("CRITICAL PACK ERROR: ", err);
                document.getElementById('loader').innerHTML = `<p style="color:#ff3b30; font-size:0.8rem;">ENGINE BOOT ERROR</p>`;
            }
        }

        function processPayloadSorting(items) {
            const uniqueVideoRegistry = new Set();
            const uniqueImageRegistry = new Set();

            items.forEach(node => {
                const internalCategory = (node.category || "").toLowerCase();

                if(internalCategory === "video") {
                    let extractedUrl = null;
                    if(node.url && node.url.includes('.mp4')) extractedUrl = node.url;
                    else if (node.directUrls && node.directUrls.length > 0) {
                        extractedUrl = node.directUrls[node.directUrls.length - 1].url;
                    }

                    if(extractedUrl) {
                        const fileKey = extractCleanPathKey(extractedUrl);
                        if (!uniqueVideoRegistry.has(fileKey)) {
                            uniqueVideoRegistry.add(fileKey);
                            localVideoStack.push({
                                hashId: btoa(fileKey).replace(/=/g, ""), // GENERATE COMPACT ID
                                title: node.title || "SHORT REEL",
                                subreddit: node.subreddit || "feed",
                                url: extractedUrl
                            });
                        }
                    }
                } else if (internalCategory === "image" || internalCategory === "gif") {
                    if (node.url) {
                        const fileKey = extractCleanPathKey(node.url);
                        if (!uniqueImageRegistry.has(fileKey)) {
                            uniqueImageRegistry.add(fileKey);
                            localImageStack.push({
                                hashId: btoa(fileKey).replace(/=/g, ""),
                                title: node.title || "GALLERY OBJECT",
                                url: node.url
                            });
                        }
                    }
                }
            });
        }

        function compileReelsStructure() {
            const videoViewport = document.getElementById('video-view');
            if(localVideoStack.length === 0) {
                videoViewport.innerHTML = `<div class="reel-node" style="color:#555;">NO UNIQUE VIDEO LOGS DETECTED</div>`;
                return;
            }

            videoViewport.innerHTML = localVideoStack.map(reel => {
                const isFavorited = favoriteRegistry[reel.hashId] ? "is-fav" : "";
                return `
                    <div class="reel-node">
                        <video class="reel-video" data-raw-src="${reel.url}" data-src-attached="false" loop playsinline webkit-playsinline></video>
                        <div class="reel-meta-deck">
                            <div class="reel-info-left">
                                <h2 class="reel-title">${reel.title}</h2>
                                <p class="reel-origin">r/${reel.subreddit}</p>
                            </div>
                            <div class="reel-actions-right">
                                <button class="fav-btn ${isFavorited}" data-fav-id="${reel.hashId}" onclick="toggleFavoriteStatus('${reel.hashId}')">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.reel-video').forEach(video => {
                video.addEventListener('click', () => {
                    if(video.paused) video.play();
                    else video.pause();
                });
            });
        }

        function compileGalleryStructure() {
            const targetContainer = document.getElementById('gallery-container');
            if(localImageStack.length === 0) {
                targetContainer.innerHTML = `<p style="color:#444;">GALLERY CONTAINER EMPTY</p>`;
                return;
            }

            targetContainer.innerHTML = localImageStack.map(image => {
                const isFavorited = favoriteRegistry[image.hashId] ? "is-fav" : "";
                return `
                    <div class="gallery-card">
                        <div class="img-slot">
                            <img data-lazy-src="${image.url}" alt="Media Item">
                        </div>
                        <div class="gallery-desc">
                            <h3 class="gallery-text" title="${image.title}">${image.title}</h3>
                            <button class="fav-btn ${isFavorited}" data-fav-id="${image.hashId}" onclick="toggleFavoriteStatus('${image.hashId}')">
                                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            if ('IntersectionObserver' in window) {
                intersectionObserverInstance = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const lazyImage = entry.target;
                            lazyImage.src = lazyImage.dataset.lazySrc;
                            lazyImage.addEventListener('load', () => lazyImage.classList.add('loaded'));
                            observer.unobserve(lazyImage);
                        }
                    });
                }, { rootMargin: "0px 0px 300px 0px" });

                document.querySelectorAll('.img-slot img').forEach(img => intersectionObserverInstance.observe(img));
            } else {
                document.querySelectorAll('.img-slot img').forEach(img => {
                    img.src = img.dataset.lazySrc;
                    img.classList.add('loaded');
                });
            }
        }

        document.addEventListener("DOMContentLoaded", initDataPipelineExecution);
    </script>
</body>
</html>

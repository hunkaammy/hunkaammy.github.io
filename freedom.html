<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA-OPTIMIZED RESPONSIVE FEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent; /* SILENCES BLINKING BOXES ON MOBILE TOUCH */
        }

        body {
            background-color: #050505;
            color: #f5f5f5;
            overflow-x: hidden;
            width: 100%;
        }

        /* PREMIUM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            will-change: transform;
        }

        /* ANTI-CLIPPING CONTROL NAVIGATION BAR */
        header {
            position: fixed;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            padding: 0 10px;
        }

        .nav-pill {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            max-width: 100%;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #8c8c8c;
            padding: 8px 18px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }

        .nav-btn.active {
            background: #ffffff;
            color: #000000;
        }

        /* PREMIUM DYNAMIC METRICS OVERLAY PANEL */
        .analytics-panel {
            max-width: 1400px;
            margin: 0 auto 24px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .metric-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #8a8a8a;
            text-transform: uppercase;
        }

        .metric-pill span.dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-video { background: #ff2d55; box-shadow: 0 0 8px #ff2d55; }
        .dot-gif { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
        .dot-image { background: #007aff; box-shadow: 0 0 8px #007aff; }

        .metric-pill strong {
            color: #ffffff;
            font-size: 1rem;
            font-variant-numeric: tabular-nums;
        }

        /* FLOATING VOLUME BUTTON */
        .audio-manager {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(18,18,18,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            z-index: 95;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        .audio-manager:hover {
            transform: scale(1.05);
            background: rgba(25, 25, 25, 0.8);
        }
        .audio-manager svg { fill: #fff; width: 16px; height: 18px; }

        /* HEART SYSTEM CONFIG */
        .fav-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 0;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .fav-btn:active { transform: scale(0.95); }
        .fav-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            transition: fill 0.3s, stroke 0.3s;
        }
        .fav-btn.is-fav {
            background: rgba(255, 45, 85, 0.1);
            border-color: rgba(255, 45, 85, 0.2);
        }
        .fav-btn.is-fav svg {
            fill: #ff2d55;
            stroke: #ff2d55;
        }

        .reel-actions-right .fav-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 0;
        }

        /* VIEW PORT CONFIGS */
        .view-section { display: none; min-height: 100vh; width: 100%; }
        .view-section.active { display: block; }

        /* REELS SNAP VIEWPORT ENGINE */
        #video-view {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            background: #000;
        }
        #video-view::-webkit-scrollbar { display: none; }

        .reel-node {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            max-width: 480px;
            object-fit: contain;
            background: #000;
            cursor: pointer;
        }

        .reel-meta-deck {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 50px 20px 35px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .reel-info-left { display: flex; flex-direction: column; max-width: 78%; pointer-events: none; }
        .reel-title { font-size: 0.9rem; font-weight: 500; color: #ffffff; margin-bottom: 6px; line-height: 1.4; letter-spacing: -0.01em; word-wrap: break-word; }
        .reel-origin { font-size: 0.7rem; color: rgba(255, 255, 255, 0.45); font-weight: 700; letter-spacing: 0.03em; }
        .reel-actions-right { pointer-events: auto; padding-bottom: 2px; }

        /* GALLERY RESPONSIVE CONTAINER LAYOUT GRID */
        #image-view, #favorites-view {
            padding: 90px 12px 40px;
            background-color: #050505;
        }

        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        @media(min-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; }
            #image-view, #favorites-view { padding: 100px 24px 40px; }
            header { top: 20px; }
            .nav-btn { font-size: 0.8rem; padding: 10px 24px; }
            .reel-title { font-size: 0.95rem; }
            
            .gallery-desc { flex-direction: row !important; align-items: center !important; }
            .fav-btn { width: auto !important; padding: 10px 12px !important; }
        }

        .gallery-card {
            background: #0d0d0d;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            height: auto;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .img-slot { width: 100%; padding-top: 125%; position: relative; background: #111; cursor: zoom-in; }
        .img-slot img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; }
        .img-slot img.loaded { opacity: 1; }

        .gallery-desc { 
            padding: 12px; 
            background: #0c0d0d; 
            display: flex; 
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }
        
        .gallery-text { 
            font-size: 0.75rem; 
            font-weight: 400; 
            color: #dcdcdc; 
            line-height: 1.4; 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            word-wrap: break-word;
        }

        .fav-section-divider {
            grid-column: 1 / -1; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); text-transform: uppercase; padding: 15px 0 5px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px;
        }

        /* ====== DYNAMIC PREMIUM LIGHTBOX OVERLAY ====== */
        .lightbox-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(3, 3, 3, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 90%;
            max-height: 90vh;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 72vh;
            object-fit: contain;
            border-radius: 12px;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            cursor: zoom-in;
        }

        .lightbox-modal.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-img.zoomed {
            transform: scale(1.4) !important;
            cursor: zoom-out;
        }

        .lightbox-btn {
            position: absolute;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 1010;
        }

        .lightbox-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.25);
            transform: scale(1.05);
            color: #fff;
        }

        .lightbox-btn:active {
            transform: scale(0.95);
        }

        .lightbox-close {
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .lightbox-close svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .nav-arrow {
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .prev-arrow {
            left: 30px;
        }

        .next-arrow {
            right: 30px;
        }

        .nav-arrow svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Lightbox info deck at bottom */
        .lightbox-info-panel {
            margin-top: 16px;
            width: 100%;
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .lightbox-info-text {
            flex-grow: 1;
            overflow: hidden;
        }

        .lightbox-title-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-wrap: break-word;
        }

        .lightbox-actions-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .lightbox-action-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lightbox-action-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .lightbox-action-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: #fff;
        }

        .lightbox-action-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .lightbox-action-btn.is-fav svg {
            fill: #ff2d55;
            stroke: #ff2d55;
        }

        @media(max-width: 767px) {
            .nav-arrow {
                width: 38px;
                height: 38px;
                background: rgba(0,0,0,0.5);
            }
            .prev-arrow { left: 10px; }
            .next-arrow { right: 10px; }
            .lightbox-info-panel {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 10px 14px;
            }
            .lightbox-actions-panel {
                width: 100%;
                justify-content: flex-end;
            }
        }

        /* STATE PULSE ANIMATIONS LOADERS */
        .app-loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .bar-pulse { display: flex; align-items: flex-end; gap: 4px; height: 24px; margin-bottom: 12px; }
        .bar-pulse div { width: 3px; height: 100%; background: #fff; animation: pulse 0.6s infinite alternate; }
        .bar-pulse div:nth-child(2) { animation-delay: 0.2s; }
        .bar-pulse div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0% { height: 30%; } 100% { height: 100%; } }
    </style>
</head>
<body>

    <div id="app-viewport">
        <header>
            <div class="nav-pill">
                <button class="nav-btn active" id="btn-video" onclick="viewRoute('video')">REELS</button>
                <button class="nav-btn" id="btn-image" onclick="viewRoute('image')">GALLERY</button>
                <button class="nav-btn" id="btn-fav" onclick="viewRoute('fav')">FAVORITES</button>
                <button class="nav-btn" id="btn-upload" onclick="triggerJsonUpload()" style="color: #ff2d55; font-weight: 700; border-left: 1px solid rgba(255,255,255,0.15); border-radius: 0 30px 30px 0; margin-left: 4px;">📂 IMPORT</button>
                <input type="file" id="json-file-input" accept=".json" style="display:none;" onchange="handleJsonFileSelect(event)">
            </div>
        </header>

        <div id="loader" class="app-loader">
            <div class="bar-pulse"><div></div><div></div><div></div></div>
            <p id="loader-text" style="font-size: 0.65rem; letter-spacing: 0.15em; color: #555; font-weight:600;">PROCESSING CHANNELS...</p>
        </div>

        <div class="audio-manager" onclick="toggleGlobalAudioVolume()" title="Toggle Sound">
            <svg id="vol-muted" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM4.34 2.93L2.93 4.34 7.29 8.75H3v6.5h4l5 5V8.46l4.74 4.74c-.38.28-.8.52-1.24.68v2.12c.98-.23 1.89-.73 2.64-1.39l2.51 2.51 1.41-1.41L4.34 2.93zM10 15.17l-2.41-2.42H5v-2.5h2.59L10 7.84v7.33z"/></svg>
            <svg id="vol-active" style="display:none;" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>

        <main id="video-view" class="view-section active"></main>

        <main id="image-view" class="view-section">
            <div class="analytics-panel" id="gallery-analytics"></div>
            <div class="gallery-grid" id="gallery-container"></div>
        </main>

        <main id="favorites-view" class="view-section">
            <div class="analytics-panel" id="fav-analytics"></div>
            <div class="gallery-grid" id="fav-container"></div>
        </main>

        <!-- DYNAMIC LIGHTBOX OVERLAY -->
        <div id="lightbox" class="lightbox-modal" onclick="closeImageLightbox()">
            <!-- Close Button -->
            <button class="lightbox-btn lightbox-close" onclick="closeImageLightbox()">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            
            <!-- Navigation Arrows -->
            <button id="lightbox-prev-btn" class="lightbox-btn nav-arrow prev-arrow" onclick="event.stopPropagation(); navigateLightbox(-1)">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button id="lightbox-next-btn" class="lightbox-btn nav-arrow next-arrow" onclick="event.stopPropagation(); navigateLightbox(1)">
                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
            </button>
            
            <div class="lightbox-content-wrapper" onclick="event.stopPropagation()">
                <img id="lightbox-target-img" class="lightbox-img" src="" alt="Enlarged visualization">
                
                <!-- Metadata Deck -->
                <div class="lightbox-info-panel">
                    <div class="lightbox-info-text">
                        <span id="lightbox-title" class="lightbox-title-text">Loading Details...</span>
                    </div>
                    <div class="lightbox-actions-panel">
                        <!-- Fav Button -->
                        <button id="lightbox-fav-btn" class="lightbox-action-btn fav-btn" onclick="toggleLightboxFavorite()">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                        <!-- Download Button -->
                        <button class="lightbox-action-btn dl-btn" onclick="downloadLightboxImage()" title="Download original media">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                        <!-- Open in New Tab -->
                        <button class="lightbox-action-btn open-btn" onclick="openLightboxImageOriginal()" title="Open original source">
                            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const RESOURCE_TARGET = "https://www.hindustantoys.in/TEST//data.json";
        let localVideoStack = [];
        let localImageStack = [];
        let systemAudioMuted = true;
        let intersectionObserverInstance = null;
        
        let counts = { video: 0, gif: 0, image: 0 };

        const STORAGE_KEY = "PREMIUM_FEED_FAVORITES_RECON";
        let favoriteRegistry = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

        // LIGHTBOX NAVIGATION STATE
        let lightboxActiveIndex = -1;
        let lightboxImageSet = [];

        // LIGHTBOX VIEW CONTROLLER TRIGGERS
        function openImageLightbox(index, isFavSection = false) {
            lightboxImageSet = isFavSection 
                ? localImageStack.filter(i => favoriteRegistry[i.hashId]) 
                : localImageStack;
            lightboxActiveIndex = index;
            updateLightboxContent();
            
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // prevent scrolling underneath
        }

        function closeImageLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.getElementById('lightbox-target-img').classList.remove('zoomed');
            document.body.style.overflow = ''; // restore scrolling
        }

        function updateLightboxContent() {
            if (lightboxActiveIndex < 0 || lightboxActiveIndex >= lightboxImageSet.length) return;
            const media = lightboxImageSet[lightboxActiveIndex];
            const targetImg = document.getElementById('lightbox-target-img');
            targetImg.classList.remove('zoomed');
            targetImg.src = media.url;
            
            // Update details
            document.getElementById('lightbox-title').innerText = media.title || 'Image Archive';
            
            // Update favorite button state
            const favBtn = document.getElementById('lightbox-fav-btn');
            if (favoriteRegistry[media.hashId]) {
                favBtn.classList.add('is-fav');
            } else {
                favBtn.classList.remove('is-fav');
            }
            
            // Show/hide navigation arrows based on bounds
            document.getElementById('lightbox-prev-btn').style.visibility = lightboxActiveIndex > 0 ? 'visible' : 'hidden';
            document.getElementById('lightbox-next-btn').style.visibility = lightboxActiveIndex < lightboxImageSet.length - 1 ? 'visible' : 'hidden';
        }

        function navigateLightbox(direction) {
            const nextIndex = lightboxActiveIndex + direction;
            if (nextIndex >= 0 && nextIndex < lightboxImageSet.length) {
                lightboxActiveIndex = nextIndex;
                updateLightboxContent();
            }
        }

        function toggleLightboxFavorite() {
            if (lightboxActiveIndex < 0 || lightboxActiveIndex >= lightboxImageSet.length) return;
            const media = lightboxImageSet[lightboxActiveIndex];
            toggleFavoriteStatus(media.hashId);
            updateLightboxContent();
        }

        function downloadLightboxImage() {
            if (lightboxActiveIndex < 0 || lightboxActiveIndex >= lightboxImageSet.length) return;
            const media = lightboxImageSet[lightboxActiveIndex];
            const a = document.createElement('a');
            a.href = media.url;
            a.download = media.title ? media.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'download';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openLightboxImageOriginal() {
            if (lightboxActiveIndex < 0 || lightboxActiveIndex >= lightboxImageSet.length) return;
            const media = lightboxImageSet[lightboxActiveIndex];
            window.open(media.url, '_blank');
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closeImageLightbox();
            } else if (e.key === 'ArrowLeft') {
                navigateLightbox(-1);
            } else if (e.key === 'ArrowRight') {
                navigateLightbox(1);
            }
        });

        // Click on image to zoom in/out
        document.getElementById('lightbox-target-img').addEventListener('click', (e) => {
            e.stopPropagation();
            e.target.classList.toggle('zoomed');
        });

        function isThumbnailUrl(urlStr) {
            if (!urlStr) return true;
            const urlLower = urlStr.toLowerCase();
            if (urlLower.includes(".thumbs.redditmedia.com")) return true;
            if (urlLower.includes("/tb/") || urlLower.includes("/thumbs/") || urlLower.includes("/thumb/")) return true;
            if (urlLower.includes("ytimg.com/vi") || urlLower.includes("img.youtube.com/vi")) return true;
            try {
                const parsedUrl = new URL(urlStr);
                const widthParam = parsedUrl.searchParams.get("width") || parsedUrl.searchParams.get("w");
                if (widthParam && parseInt(widthParam, 10) < 480) return true;
            } catch(e) {}
            if (urlLower.includes("sb-") || urlLower.includes("sb.preview.redd.it")) return true;
            return false;
        }

        function viewRoute(targetSection) {
            document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.nav-pill .nav-btn').forEach(btn => {
                if(btn.id !== 'btn-upload') btn.classList.remove('active');
            });
            freezeVideoAssets();

            if(targetSection === 'video') {
                document.getElementById('video-view').classList.add('active');
                document.getElementById('btn-video').classList.add('active');
                evaluateVideoPlayStates();
            } else if(targetSection === 'image') {
                document.getElementById('image-view').classList.add('active');
                document.getElementById('btn-image').classList.add('active');
            } else if(targetSection === 'fav') {
                document.getElementById('favorites-view').classList.add('active');
                document.getElementById('btn-fav').classList.add('active');
                compileFavoritesTabGrid();
            }
        }

        function freezeVideoAssets() {
            document.querySelectorAll('.reel-video').forEach(video => {
                video.pause();
                if(video.dataset.srcAttached === "true") {
                    video.removeAttribute('src');
                    video.load();
                    video.dataset.srcAttached = "false";
                }
            });
        }

        function toggleGlobalAudioVolume() {
            systemAudioMuted = !systemAudioMuted;
            document.getElementById('vol-muted').style.display = systemAudioMuted ? "block" : "none";
            document.getElementById('vol-active').style.display = systemAudioMuted ? "none" : "block";
            document.querySelectorAll('.reel-video').forEach(vid => { vid.muted = systemAudioMuted; });
        }

        function evaluateVideoPlayStates() {
            if (!document.getElementById('video-view').classList.contains('active')) return;
            
            const reels = document.querySelectorAll('#video-view .reel-node');
            const innerHeight = window.innerHeight;

            reels.forEach(reel => {
                const boundary = reel.getBoundingClientRect();
                const video = reel.querySelector('.reel-video');
                const absoluteTargetSrc = video.dataset.rawSrc;

                if (boundary.top >= -innerHeight * 0.6 && boundary.top <= innerHeight * 0.6) {
                    if (video.dataset.srcAttached !== "true") {
                        video.setAttribute('src', absoluteTargetSrc);
                        video.load();
                        video.dataset.srcAttached = "true";
                    }
                    if (boundary.top >= -80 && boundary.top <= 80) {
                        if (video.paused) {
                            video.muted = systemAudioMuted;
                            video.play().catch(() => {});
                        }
                    } else {
                        if (!video.paused) video.pause();
                    }
                } else {
                    if (video.dataset.srcAttached === "true") {
                        video.removeAttribute('src');
                        video.load();
                        video.dataset.srcAttached = "false";
                    }
                }
            });
        }

        function extractCleanPathKey(urlPath) {
            try {
                const urlObj = new URL(urlPath);
                let cleanPath = urlObj.origin + urlObj.pathname;
                cleanPath = cleanPath.replace(/_(\d+p)\.mp4/g, '_base.mp4');
                return cleanPath.split('?')[0];
            } catch (e) {
                return urlPath.split('?')[0].replace(/_(\d+p)\.mp4/g, '_base.mp4');
            }
        }

        function shuffleDataArray(targetArray) {
            for (let i = targetArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [targetArray[i], targetArray[j]] = [targetArray[j], targetArray[i]];
            }
            return targetArray;
        }

        function toggleFavoriteStatus(uniqueKey) {
            if (favoriteRegistry[uniqueKey]) {
                delete favoriteRegistry[uniqueKey];
            } else {
                favoriteRegistry[uniqueKey] = true;
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(favoriteRegistry));
            
            document.querySelectorAll(`[data-fav-id="${uniqueKey}"]`).forEach(btn => {
                favoriteRegistry[uniqueKey] ? btn.classList.add('is-fav') : btn.classList.remove('is-fav');
            });

            if (document.getElementById('favorites-view').classList.contains('active')) {
                compileFavoritesTabGrid();
            }
        }

        // JSON UPLOADER SYSTEM
        function triggerJsonUpload() {
            document.getElementById('json-file-input').click();
        }

        function handleJsonFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            document.getElementById('loader-text').innerText = "IMPORTING LOCAL ARCHIVE...";
            document.getElementById('loader').style.display = "flex";
            
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) {
                        alert("Invalid file structure. Must be a JSON array containing media details.");
                        document.getElementById('loader').style.display = "none";
                        return;
                    }
                    
                    freezeVideoAssets();
                    processPayloadSorting(data);
                    
                    shuffleDataArray(localVideoStack);
                    shuffleDataArray(localImageStack);

                    compileReelsStructure();
                    compileGalleryStructure();
                    renderMetricsUI();
                    
                    // Reset to active view
                    const currentActive = document.querySelector('.nav-pill button.active');
                    if (currentActive) {
                        const targetId = currentActive.id.replace('btn-', '');
                        viewRoute(targetId);
                    } else {
                        viewRoute('video');
                    }

                    document.getElementById('loader').style.display = "none";
                    document.getElementById('loader-text').innerText = "PROCESSING CHANNELS...";
                    
                } catch(err) {
                    alert("Error parsing imported JSON: " + err.message);
                    document.getElementById('loader').style.display = "none";
                }
            };
            reader.readAsText(file);
        }

        async function initDataPipelineExecution() {
            try {
                const payload = await fetch(RESOURCE_TARGET);
                if (!payload.ok) throw new Error("API STRUCT DATA RESPONSE ERROR");
                const arrayPack = await payload.json();

                processPayloadSorting(arrayPack);
                
                shuffleDataArray(localVideoStack);
                shuffleDataArray(localImageStack);

                compileReelsStructure();
                compileGalleryStructure();
                renderMetricsUI();

                document.getElementById('loader').style.display = "none";

                let scrollTimeout;
                document.getElementById('video-view').addEventListener('scroll', () => {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(evaluateVideoPlayStates, 40);
                }, { passive: true });

            } catch (err) {
                console.warn("Could not fetch remote resource. Waiting for local JSON import.", err);
                document.getElementById('loader').style.display = "none";
                // Show empty states / waiting instruction
                document.getElementById('video-view').innerHTML = `
                    <div class="reel-node" style="flex-direction: column; gap: 15px; color:#aaa; font-size: 0.85rem; padding: 20px; text-align: center;">
                        <svg viewBox="0 0 24 24" style="fill: #ff2d55; width: 48px; height: 48px; margin-bottom: 10px;"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                        <span>READY TO SCAN CHANNELS</span>
                        <button onclick="triggerJsonUpload()" style="background: #ff2d55; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: transform 0.2s;">📂 IMPORT EXPORTED JSON</button>
                    </div>
                `;
            }
        }

        function processPayloadSorting(items) {
            const uniqueVideoRegistry = new Set();
            const uniqueImageRegistry = new Set();
            
            localVideoStack = [];
            localImageStack = [];
            counts = { video: 0, gif: 0, image: 0 };

            items.forEach(node => {
                const internalCategory = (node.category || "").toLowerCase();
                let assetUrl = node.url;

                if(internalCategory === "video" && (!assetUrl || !assetUrl.includes(".mp4"))) {
                    if (node.directUrls && node.directUrls.length > 0) {
                        assetUrl = node.directUrls[node.directUrls.length - 1].url;
                    }
                }

                if (!assetUrl || isThumbnailUrl(assetUrl)) return;

                const fileKey = extractCleanPathKey(assetUrl);

                if(internalCategory === "video") {
                    if (!uniqueVideoRegistry.has(fileKey)) {
                        uniqueVideoRegistry.add(fileKey);
                        counts.video++;
                        localVideoStack.push({
                            hashId: btoa(fileKey).replace(/=/g, "").substring(0, 20),
                            title: node.title || "SHORT REEL",
                            subreddit: node.subreddit || "feed",
                            url: assetUrl
                        });
                    }
                } else if (internalCategory === "image" || internalCategory === "gif") {
                    if (!uniqueImageRegistry.has(fileKey)) {
                        uniqueImageRegistry.add(fileKey);
                        if (internalCategory === "gif") counts.gif++; else counts.image++;
                        
                        localImageStack.push({
                            hashId: btoa(fileKey).replace(/=/g, "").substring(0, 20),
                            title: node.title || "GALLERY OBJECT",
                            url: assetUrl,
                            isGif: internalCategory === "gif"
                        });
                    }
                }
            });
        }

        function renderMetricsUI(targetId = 'gallery-analytics', customCounts = null) {
            const outputId = document.getElementById(targetId);
            if (!outputId) return;
            const source = customCounts || counts;
            const total = source.video + source.gif + source.image;

            outputId.innerHTML = `
                <div class="metric-pill"><span class="dot dot-video"></span>Videos: <strong>${source.video}</strong></div>
                <div class="metric-pill"><span class="dot dot-gif"></span>Gifs: <strong>${source.gif}</strong></div>
                <div class="metric-pill"><span class="dot dot-image"></span>Images: <strong>${source.image}</strong></div>
                <div class="metric-pill" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left:12px;">Total: <strong style="color:#fff;">${total}</strong></div>
            `;
        }

        function compileReelsStructure() {
            const videoViewport = document.getElementById('video-view');
            if(localVideoStack.length === 0) {
                videoViewport.innerHTML = `
                    <div class="reel-node" style="color:#555; flex-direction:column; gap: 15px;">
                        <span>NO STREAMS INGESTED</span>
                        <button onclick="triggerJsonUpload()" style="background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.12); padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer;">IMPORT JSON</button>
                    </div>`;
                return;
            }

            videoViewport.innerHTML = localVideoStack.map(reel => {
                const isFavorited = favoriteRegistry[reel.hashId] ? "is-fav" : "";
                return `
                    <div class="reel-node">
                        <video class="reel-video" data-raw-src="${reel.url}" data-src-attached="false" loop playsinline webkit-playsinline></video>
                        <div class="reel-meta-deck">
                            <div class="reel-info-left">
                                <h2 class="reel-title">${reel.title}</h2>
                                <p class="reel-origin">r/${reel.subreddit}</p>
                            </div>
                            <div class="reel-actions-right">
                                <button class="fav-btn ${isFavorited}" data-fav-id="${reel.hashId}" onclick="toggleFavoriteStatus('${reel.hashId}')">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.reel-video').forEach(video => {
                video.addEventListener('click', () => { video.paused ? video.play() : video.pause(); });
            });
        }

        function compileGalleryStructure() {
            const targetContainer = document.getElementById('gallery-container');
            if(localImageStack.length === 0) {
                targetContainer.innerHTML = `<p style="color:#444; text-align:center; padding: 40px 0; grid-column: 1/-1;">GALLERY CONTAINER EMPTY</p>`;
                return;
            }

            targetContainer.innerHTML = localImageStack.map((image, index) => {
                const isFavorited = favoriteRegistry[image.hashId] ? "is-fav" : "";
                return `
                    <div class="gallery-card">
                        <div class="img-slot" onclick="openImageLightbox(${index}, false)">
                            <img data-lazy-src="${image.url}" alt="Media Item">
                        </div>
                        <div class="gallery-desc">
                            <h3 class="gallery-text" title="${image.title}">${image.title}</h3>
                            <button class="fav-btn ${isFavorited}" data-fav-id="${image.hashId}" onclick="toggleFavoriteStatus('${image.hashId}')">
                                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            bindIntersectionLazyLoaders();
        }

        function compileFavoritesTabGrid() {
            const target = document.getElementById('fav-container');
            const savedVideos = localVideoStack.filter(v => favoriteRegistry[v.hashId]);
            const savedImages = localImageStack.filter(i => favoriteRegistry[i.hashId]);

            let favCounts = { video: savedVideos.length, gif: 0, image: 0 };
            savedImages.forEach(img => { img.isGif ? favCounts.gif++ : favCounts.image++; });
            renderMetricsUI('fav-analytics', favCounts);

            if (savedVideos.length === 0 && savedImages.length === 0) {
                target.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 0; color:#444; font-size:0.8rem; letter-spacing:0.05em;">YOUR FAVORITES DIRECTORY IS EMPTY</div>`;
                return;
            }

            let htmlPayload = "";

            if (savedVideos.length > 0) {
                htmlPayload += `<div class="fav-section-divider">SAVED REEL CLIPS (${savedVideos.length})</div>`;
                savedVideos.forEach(v => {
                    htmlPayload += `
                        <div class="gallery-card">
                            <div class="img-slot" style="background:#000; cursor:default;">
                                <video src="${v.url}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain;" controls muted></video>
                            </div>
                            <div class="gallery-desc">
                                <h3 class="gallery-text">${v.title}</h3>
                                <button class="fav-btn is-fav" data-fav-id="${v.hashId}" onclick="toggleFavoriteStatus('${v.hashId}')">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            if (savedImages.length > 0) {
                htmlPayload += `<div class="fav-section-divider">SAVED IMAGE & GIF ARCHIVES (${savedImages.length})</div>`;
                savedImages.forEach((i, index) => {
                    htmlPayload += `
                        <div class="gallery-card">
                            <div class="img-slot" onclick="openImageLightbox(${index}, true)">
                                <img src="${i.url}" class="loaded" alt="Saved Frame">
                            </div>
                            <div class="gallery-desc">
                                <h3 class="gallery-text">${i.title}</h3>
                                <button class="fav-btn is-fav" data-fav-id="${i.hashId}" onclick="toggleFavoriteStatus('${i.hashId}')">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            target.innerHTML = htmlPayload;
        }

        function bindIntersectionLazyLoaders() {
            if ('IntersectionObserver' in window) {
                intersectionObserverInstance = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.src = img.dataset.lazySrc;
                            img.addEventListener('load', () => img.classList.add('loaded'));
                            observer.unobserve(img);
                        }
                    });
                }, { rootMargin: "0px 0px 250px 0px" });
                document.querySelectorAll('.img-slot img').forEach(img => intersectionObserverInstance.observe(img));
            } else {
                document.querySelectorAll('.img-slot img').forEach(img => {
                    img.src = img.dataset.lazySrc; img.classList.add('loaded');
                });
            }
        }

        document.addEventListener("DOMContentLoaded", initDataPipelineExecution);
    </script>
</body>
</html>
